name: publink-audit-timeline

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_password123}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - audit_sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 25s

  backend:
    build:
      context: ..
      dockerfile: infrastructure/backend.Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AuditTimeline: "Server=sql,1433;Database=AuditTimeline;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;Encrypt=False"
      AuditTimeline__ApiKey: ${AUDIT_API_KEY:-local-dev-audit-key}
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:8080
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "5080:8080"

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5080
        VITE_AUDIT_API_KEY: ${AUDIT_API_KEY:-local-dev-audit-key}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  audit_sql_data:
